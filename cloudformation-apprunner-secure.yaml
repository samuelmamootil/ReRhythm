AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ReRhythm - Secure App Runner Deployment
  Frontend: Public App Runner | Backend: Private VPC with VPC Endpoints
  Encryption at rest & transit | DNS with Route53 | Secrets in Secrets Manager

Parameters:
  EnvironmentName:
    Type: String
    Default: rerythm-prod
    Description: Environment name prefix

  DomainName:
    Type: String
    Default: ""
    Description: Custom domain name (leave empty to use App Runner default domain)

  HostedZoneId:
    Type: String
    Default: ""
    Description: Route53 Hosted Zone ID (leave empty to use App Runner default domain)

  ECRImageUri:
    Type: String
    Description: ECR image URI (e.g., 123456789012.dkr.ecr.us-east-1.amazonaws.com/rerythm:latest)

  BedrockModelId:
    Type: String
    Default: us.anthropic.claude-sonnet-4-5-20250929-v1:0
    Description: Bedrock model ID

Conditions:
  CreateCustomDomain: !Not [!Equals [!Ref DomainName, ""]]



Resources:

  # ═══════════════════════════════════════════════════════════════
  # NETWORKING - Private VPC with VPC Endpoints
  # ═══════════════════════════════════════════════════════════════

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-vpc"

  # Private Subnets (for VPC Endpoints)
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-private-subnet-1"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-private-subnet-2"

  # Security Group for VPC Endpoints
  VPCEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for VPC endpoints
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-vpce-sg"

  # Security Group for App Runner
  AppRunnerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for App Runner egress
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-apprunner-sg"

  # VPC Endpoints - No internet access for backend services
  S3VPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable

  DynamoDBVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.dynamodb"
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable

  BedrockRuntimeVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.bedrock-runtime"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  TextractVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.textract"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  SecretsManagerVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.secretsmanager"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  # Private Route Table
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-private-rt"

  PrivateSubnet1RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # VPC Connector for App Runner
  AppRunnerVPCConnector:
    Type: AWS::AppRunner::VpcConnector
    Properties:
      VpcConnectorName: !Sub "${EnvironmentName}-vpc-connector"
      Subnets:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroups:
        - !Ref AppRunnerSecurityGroup

  # ═══════════════════════════════════════════════════════════════
  # STORAGE - S3 with Encryption
  # ═══════════════════════════════════════════════════════════════

  S3KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for S3 bucket encryption
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

  S3KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${EnvironmentName}-s3-key"
      TargetKeyId: !Ref S3KMSKey

  ResumeUploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-resume-uploads-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref S3KMSKey
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldResumes
            Status: Enabled
            ExpirationInDays: 30
            NoncurrentVersionExpirationInDays: 7
      LoggingConfiguration:
        DestinationBucketName: !Ref LoggingBucket
        LogFilePrefix: s3-access-logs/

  LoggingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-logs-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 90

  # ═══════════════════════════════════════════════════════════════
  # DATABASE - DynamoDB with Encryption
  # ═══════════════════════════════════════════════════════════════

  DynamoDBKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for DynamoDB encryption
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: Allow DynamoDB to use the key
            Effect: Allow
            Principal:
              Service: dynamodb.amazonaws.com
            Action:
              - "kms:Decrypt"
              - "kms:DescribeKey"
              - "kms:CreateGrant"
            Resource: "*"

  DynamoDBKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${EnvironmentName}-dynamodb-key"
      TargetKeyId: !Ref DynamoDBKMSKey

  RoadmapResponseTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${EnvironmentName}-roadmap-responses"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: createdAt
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref DynamoDBKMSKey
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  LessonPlanTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${EnvironmentName}-lesson-plans"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: moduleId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: moduleId
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref DynamoDBKMSKey
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  BadgeAchievementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${EnvironmentName}-badge-achievements"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: badgeId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: badgeId
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref DynamoDBKMSKey
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ═══════════════════════════════════════════════════════════════
  # SECRETS MANAGER - Store sensitive configuration
  # ═══════════════════════════════════════════════════════════════

  AppConfigSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${EnvironmentName}/app-config"
      Description: ReRhythm application configuration secrets
      SecretString: !Sub |
        {
          "AWS_REGION": "${AWS::Region}",
          "BEDROCK_MODEL_ID": "${BedrockModelId}",
          "RESUME_BUCKET": "${ResumeUploadBucket}",
          "ROADMAP_TABLE": "${RoadmapResponseTable}",
          "LESSON_TABLE": "${LessonPlanTable}",
          "BADGE_TABLE": "${BadgeAchievementTable}",
          "ENVIRONMENT": "${EnvironmentName}"
        }
      KmsKeyId: !Ref SecretsKMSKey

  SecretsKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for Secrets Manager
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

  # ═══════════════════════════════════════════════════════════════
  # IAM ROLES - Least Privilege Access
  # ═══════════════════════════════════════════════════════════════

  AppRunnerInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-apprunner-instance-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: tasks.apprunner.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/CloudWatchLogsFullAccess"
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:PutObject"
                  - "s3:DeleteObject"
                Resource: !Sub "${ResumeUploadBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - "s3:ListBucket"
                Resource: !GetAtt ResumeUploadBucket.Arn
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "dynamodb:GetItem"
                  - "dynamodb:PutItem"
                  - "dynamodb:UpdateItem"
                  - "dynamodb:Query"
                  - "dynamodb:Scan"
                Resource:
                  - !GetAtt RoadmapResponseTable.Arn
                  - !GetAtt LessonPlanTable.Arn
                  - !GetAtt BadgeAchievementTable.Arn
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "bedrock:InvokeModel"
                  - "bedrock:InvokeModelWithResponseStream"
                Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/*"
        - PolicyName: TextractAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "textract:AnalyzeDocument"
                  - "textract:DetectDocumentText"
                Resource: "*"
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "secretsmanager:GetSecretValue"
                Resource: !Ref AppConfigSecret
        - PolicyName: KMSAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "kms:Decrypt"
                  - "kms:DescribeKey"
                  - "kms:GenerateDataKey"
                Resource:
                  - !GetAtt S3KMSKey.Arn
                  - !GetAtt DynamoDBKMSKey.Arn
                  - !GetAtt SecretsKMSKey.Arn

  AppRunnerAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-apprunner-access-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: build.apprunner.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess"

  # ═══════════════════════════════════════════════════════════════
  # APP RUNNER - Public Frontend with Private Backend Access
  # ═══════════════════════════════════════════════════════════════

  AppRunnerService:
    Type: AWS::AppRunner::Service
    DependsOn:
      - BedrockRuntimeVPCEndpoint
      - TextractVPCEndpoint
      - S3VPCEndpoint
      - DynamoDBVPCEndpoint
    Properties:
      ServiceName: rerythm
      SourceConfiguration:
        AuthenticationConfiguration:
          AccessRoleArn: !GetAtt AppRunnerAccessRole.Arn
        ImageRepository:
          ImageIdentifier: !Ref ECRImageUri
          ImageRepositoryType: ECR
          ImageConfiguration:
            Port: "8080"
            RuntimeEnvironmentVariables:
              - Name: ASPNETCORE_ENVIRONMENT
                Value: Production
              - Name: ASPNETCORE_URLS
                Value: "http://+:8080"
              - Name: AWS__Region
                Value: !Ref AWS::Region
              - Name: ReRhythm__BedrockModelId
                Value: !Ref BedrockModelId
              - Name: ReRhythm__ResumeUploadBucket
                Value: !Ref ResumeUploadBucket
              - Name: ReRhythm__RoadmapTableName
                Value: !Ref RoadmapResponseTable
              - Name: ReRhythm__LessonTableName
                Value: !Ref LessonPlanTable
              - Name: ReRhythm__BadgeTableName
                Value: !Ref BadgeAchievementTable
              - Name: ReRhythm__RagMode
                Value: DIRECT
              - Name: ReRhythm__MaxTokens
                Value: "4096"
              - Name: DynamoDB__RoadmapResponsesTable
                Value: !Ref RoadmapResponseTable
              - Name: DynamoDB__LessonPlansTable
                Value: !Ref LessonPlanTable
              - Name: S3__ResumeBucket
                Value: !Ref ResumeUploadBucket
      InstanceConfiguration:
        Cpu: "1 vCPU"
        Memory: "2 GB"
        InstanceRoleArn: !GetAtt AppRunnerInstanceRole.Arn
      NetworkConfiguration:
        EgressConfiguration:
          EgressType: VPC
          VpcConnectorArn: !GetAtt AppRunnerVPCConnector.VpcConnectorArn
        IngressConfiguration:
          IsPubliclyAccessible: true
      HealthCheckConfiguration:
        Protocol: HTTP
        Path: /
        Interval: 10
        Timeout: 5
        HealthyThreshold: 1
        UnhealthyThreshold: 5
      AutoScalingConfigurationArn: !GetAtt AppRunnerAutoScaling.AutoScalingConfigurationArn
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  AppRunnerAutoScaling:
    Type: AWS::AppRunner::AutoScalingConfiguration
    Properties:
      AutoScalingConfigurationName: !Sub "${EnvironmentName}-autoscaling"
      MinSize: 1
      MaxSize: 10
      MaxConcurrency: 10

  # ═══════════════════════════════════════════════════════════════
  # DNS - Route53 Custom Domain (Optional)
  # ═══════════════════════════════════════════════════════════════

  AppRunnerCustomDomain:
    Type: AWS::AppRunner::CustomDomainAssociation
    Condition: CreateCustomDomain
    Properties:
      ServiceArn: !GetAtt AppRunnerService.ServiceArn
      DomainName: !Ref DomainName

  DNSRecord:
    Type: AWS::Route53::RecordSet
    Condition: CreateCustomDomain
    DependsOn: AppRunnerCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: CNAME
      TTL: 300
      ResourceRecords:
        - !GetAtt AppRunnerService.ServiceUrl

  # ═══════════════════════════════════════════════════════════════
  # MONITORING - CloudWatch Alarms
  # ═══════════════════════════════════════════════════════════════

  HighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${EnvironmentName}-high-cpu"
      AlarmDescription: Alert when CPU exceeds 80%
      MetricName: CPUUtilization
      Namespace: AWS/AppRunner
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ServiceName
          Value: rerythm

  HighMemoryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${EnvironmentName}-high-memory"
      AlarmDescription: Alert when memory exceeds 80%
      MetricName: MemoryUtilization
      Namespace: AWS/AppRunner
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ServiceName
          Value: rerythm

# ═══════════════════════════════════════════════════════════════
# OUTPUTS
# ═══════════════════════════════════════════════════════════════

Outputs:
  AppRunnerServiceUrl:
    Description: App Runner service URL
    Value: !Sub "https://${AppRunnerService.ServiceUrl}"
    Export:
      Name: !Sub "${EnvironmentName}-service-url"

  CustomDomainUrl:
    Condition: CreateCustomDomain
    Description: Custom domain URL
    Value: !Sub "https://${DomainName}"
    Export:
      Name: !Sub "${EnvironmentName}-custom-domain"

  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub "${EnvironmentName}-vpc-id"

  ResumeUploadBucketName:
    Description: S3 Resume Bucket
    Value: !Ref ResumeUploadBucket
    Export:
      Name: !Sub "${EnvironmentName}-resume-bucket"

  RoadmapTableName:
    Description: DynamoDB Roadmap Table
    Value: !Ref RoadmapResponseTable
    Export:
      Name: !Sub "${EnvironmentName}-roadmap-table"

  LessonTableName:
    Description: DynamoDB Lesson Table
    Value: !Ref LessonPlanTable
    Export:
      Name: !Sub "${EnvironmentName}-lesson-table"

  BadgeTableName:
    Description: DynamoDB Badge Table
    Value: !Ref BadgeAchievementTable
    Export:
      Name: !Sub "${EnvironmentName}-badge-table"

  AppConfigSecretArn:
    Description: Secrets Manager ARN for app config
    Value: !Ref AppConfigSecret
    Export:
      Name: !Sub "${EnvironmentName}-app-config-secret"

  AppRunnerServiceArn:
    Description: App Runner Service ARN
    Value: !GetAtt AppRunnerService.ServiceArn
    Export:
      Name: !Sub "${EnvironmentName}-service-arn"
