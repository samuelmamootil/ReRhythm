AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ReRhythm - Direct Mode Platform (No RAG/OSS/Lambda)
  EC2 + Claude Direct Invocation + Textract + DynamoDB + S3

Parameters:
  EnvironmentName:
    Type: String
    Default: rerythm-prod

  EC2InstanceType:
    Type: String
    Default: m5.large
    AllowedValues: [m5.large, m5.xlarge, m6i.large, m6i.xlarge]

  AdminCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: Your IP for SSH access (e.g. 1.2.3.4/32)

  AMIId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2

  BedrockModelId:
    Type: String
    # ✅ Fix 2: model ID string only — NOT the full ARN
    Default: anthropic.claude-3-sonnet-20240229-v1:0

  RagMode:
    Type: String
    Default: DIRECT
    AllowedValues: [DIRECT, FULL]

Resources:

  # ─────────────────────────────────────────
  # KEY PAIR
  # ─────────────────────────────────────────
  ReRhythmKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub "${EnvironmentName}-keypair"
      KeyType: rsa
      KeyFormat: ppk
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-keypair"

  # ─────────────────────────────────────────
  # NETWORKING
  # ─────────────────────────────────────────
  ReRhythmVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-vpc"

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ReRhythmVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-public-subnet-1"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-igw"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref ReRhythmVPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ReRhythmVPC
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-public-rt"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  # ─────────────────────────────────────────
  # SECURITY GROUP
  # ─────────────────────────────────────────
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ReRhythm EC2 App Security Group
      VpcId: !Ref ReRhythmVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AdminCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-sg"

  # ─────────────────────────────────────────
  # S3
  # ─────────────────────────────────────────
  ResumeUploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-resume-uploads-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldResumes
            Status: Enabled
            ExpirationInDays: 30
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ["*"]
            MaxAge: 3000

  # ─────────────────────────────────────────
  # DYNAMODB
  # ─────────────────────────────────────────
  RoadmapResponseTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${EnvironmentName}-roadmap-responses"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: createdAt
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  LessonPlanTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${EnvironmentName}-lesson-plans"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: moduleId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: moduleId
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true

  # ─────────────────────────────────────────
  # IAM
  # ─────────────────────────────────────────
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-ec2-instance-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: ReRhythmEC2Policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Bedrock — Claude direct invocation
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"
              # ✅ Fix 4: Textract — needed for resume parsing
              - Effect: Allow
                Action:
                  - textract:AnalyzeDocument
                  - textract:DetectDocumentText
                  - textract:StartDocumentTextDetection
                  - textract:GetDocumentTextDetection
                Resource: "*"
              # S3
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt ResumeUploadBucket.Arn
                  - !Sub "${ResumeUploadBucket.Arn}/*"
              # DynamoDB
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt RoadmapResponseTable.Arn
                  - !GetAtt LessonPlanTable.Arn
              # SSM — read own parameters
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/rerythm/*"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  # ─────────────────────────────────────────
  # EC2 INSTANCE
  # ─────────────────────────────────────────
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref EC2InstanceType
      KeyName: !Ref ReRhythmKeyPair
      ImageId: !Ref AMIId
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-dotnet-app"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          yum update -y

          # ✅ Fix 1: Plain URL — no HTML hyperlink formatting
          rpm -Uvh https://packages.microsoft.com/config/centos/7/packages-microsoft-prod.rpm
          yum install -y dotnet-sdk-8.0

          amazon-linux-extras install nginx1 -y
          systemctl enable nginx
          systemctl start nginx

          # ✅ Fix 2: BedrockModelId is just the model ID string
          # ✅ Fix 3: No quotes around empty string in heredoc
          cat >> /etc/environment << EOF
          ASPNETCORE_ENVIRONMENT=Production
          ASPNETCORE_URLS=http://0.0.0.0:5000
          AWS__Region=${AWS::Region}
          ReRhythm__RagMode=${RagMode}
          ReRhythm__BedrockModelId=${BedrockModelId}
          ReRhythm__BedrockKnowledgeBaseId=
          ReRhythm__ResumeUploadBucket=${ResumeUploadBucket}
          ReRhythm__RoadmapTableName=${RoadmapResponseTable}
          ReRhythm__LessonTableName=${LessonPlanTable}
          EOF

          # Nginx reverse proxy
          cat > /etc/nginx/conf.d/rerythm.conf << 'NGINX'
          server {
              listen 80;
              location / {
                  proxy_pass         http://localhost:5000;
                  proxy_http_version 1.1;
                  proxy_set_header   Upgrade $http_upgrade;
                  proxy_set_header   Connection keep-alive;
                  proxy_set_header   Host $host;
                  proxy_cache_bypass $http_upgrade;
                  proxy_read_timeout 300s;
              }
          }
          NGINX
          systemctl restart nginx
    DependsOn:
      - RoadmapResponseTable
      - LessonPlanTable
      - ResumeUploadBucket

  # ─────────────────────────────────────────
  # ELASTIC IP
  # ─────────────────────────────────────────
  EC2ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
    DependsOn: VPCGatewayAttachment

  EC2EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref EC2Instance
      EIP: !Ref EC2ElasticIP

# ─────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────
Outputs:
  AppURL:
    Description: ReRhythm App URL
    Value: !Sub "http://${EC2ElasticIP}"

  AppURLDirect:
    Description: Direct Kestrel port
    Value: !Sub "http://${EC2ElasticIP}:5000"

  EC2PublicIP:
    Description: EC2 Public IP
    Value: !Ref EC2ElasticIP
    Export:
      Name: !Sub "${EnvironmentName}-ec2-ip"

  SSHKeyCommand:
    Description: Command to retrieve your private .ppk key from SSM
    Value: !Sub >
      aws ssm get-parameter
      --name /ec2/keypairs/${ReRhythmKeyPair.KeyPairId}
      --with-decryption
      --query Parameter.Value
      --output text > rerythm-key.ppk

  ResumeUploadBucketName:
    Description: S3 Resume Bucket
    Value: !Ref ResumeUploadBucket
    Export:
      Name: !Sub "${EnvironmentName}-resume-bucket"

  DynamoDBRoadmapTable:
    Description: DynamoDB Roadmap Table
    Value: !Ref RoadmapResponseTable
    Export:
      Name: !Sub "${EnvironmentName}-roadmap-table"

  DynamoDBLessonTable:
    Description: DynamoDB Lesson Table
    Value: !Ref LessonPlanTable
    Export:
      Name: !Sub "${EnvironmentName}-lesson-table"

  KeyPairSSMPath:
    Description: SSM path for your .ppk private key
    Value: !Sub "/ec2/keypairs/${ReRhythmKeyPair.KeyPairId}"
